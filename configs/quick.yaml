experiment:
  name: quick_60m

run_dirs:
  results_dir: results
  checkpoints_dir: checkpoints
  outputs_dir: Generated upscaled images from testset
  report_dir: report

data:
  scale: 4
  train_hr_dir: data/Mini-DIV2K/Train/HR
  train_lr_dir: data/Mini-DIV2K/Train/LR_x4
  val_hr_dir: data/Mini-DIV2K/Val/HR
  val_lr_dir: data/Mini-DIV2K/Val/LR_x4
  test_lr_dir: data/test/LR
  patch_size: 128
  train_batch_size: 8
  val_batch_size: 1
  num_workers: 4
  pin_memory: false

augmentation:
  hflip_prob: 0.5
  vflip_prob: 0.5
  rot90_prob: 0.5
  rgb_perm_prob: 0.3
  cutblur_prob: 0.3
  cutblur_alpha: 0.4

model:
  scale: 4
  num_in_ch: 3
  num_out_ch: 3
  num_feat: 64
  num_block: 20

loss:
  charbonnier_eps: 0.001

optim:
  lr: 0.0002
  betas: [0.9, 0.99]
  weight_decay: 0.0
  grad_clip: 1.0

schedule:
  total_iters: 12000
  eta_min: 0.0000001
  val_interval: 1000
  val_max_images: 8
  save_interval: 1000
  log_interval: 20
  ema_decay: 0.999

metrics:
  crop_border: 4

inference:
  tile: 0
  tile_pad: 16

runtime:
  device: auto
  seed: 3407
  deterministic: false
